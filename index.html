<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiH5Tji4WfG5r2d_T0XAd2LBBNB28t2dhFqJAcbR5JSpyMqqNB6IbugiC2Vos-2smWIa3tMpA7kEHf3iMcHSsbmkZUw9I1AwP-ocTRnlzLDJWjCb8eH5m2cRXiWpIa-O6a1bOSdyB9hUg-FepVa9QPjTs8Co6nX0_GDnednjERDFmN1quZbkIbW5wQjh2I/s1024/103777.png">
    <title>elgoharyX · روابط</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        :root { --blue: #007AFF; --bg: #F2F2F7; }
        body { background: var(--bg); min-height: 100vh; display: flex; justify-content: center; margin: 0; }
        .container { width: 100%; max-width: 428px; background: var(--bg); min-height: 100vh; }
        .card { background: white; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
        .input-group { background: #F8F8FC; border-radius: 12px; padding: 4px 16px; margin-bottom: 16px; border: 0.5px solid #E5E5EA; }
        .input-group:focus-within { border-color: var(--blue); background: white; }
        .input-label { font-size: 11px; color: #8E8E93; text-transform: uppercase; padding-top: 8px; }
        .input-field { width: 100%; border: none; background: transparent; padding: 8px 0 10px; font-size: 16px; outline: none; }
        .btn { background: var(--blue); color: white; font-size: 17px; font-weight: 600; padding: 14px; border-radius: 12px; border: none; width: 100%; cursor: pointer; }
        .btn:active { opacity: 0.8; }
        .btn:disabled { opacity: 0.5; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 100%; max-width: 380px; height: 100%; background: white; z-index: 1000; transition: right 0.3s; box-shadow: -5px 0 20px rgba(0,0,0,0.1); overflow-y: auto; }
        .sidebar.open { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 999; display: none; }
        .overlay.active { display: block; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1C1C1E; color: white; padding: 12px 20px; border-radius: 30px; font-size: 14px; z-index: 2000; display: none; }
        .toast.show { display: block; }
        .dir-ltr { direction: ltr; text-align: left; }
        .hidden { display: none !important; }
        .nav-bar { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50; }
        .avatar { width: 60px; height: 60px; border-radius: 20px; margin: 0 auto 16px; display: block; object-fit: cover; }
        .user-avatar-img { width: 50px; height: 50px; border-radius: 25px; object-fit: cover; }
        .link-item { background: #F8F8FC; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
        .link-actions { display: flex; gap: 8px; margin-top: 12px; }
        .link-btn { flex: 1; padding: 8px; border-radius: 8px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; }
        .btn-copy { background: rgba(52,199,89,0.1); color: #34C759; }
        .btn-edit { background: rgba(0,122,255,0.1); color: #007AFF; }
        .btn-delete { background: rgba(255,59,48,0.1); color: #FF3B30; }
        .loader { width: 40px; height: 40px; border: 3px solid #E5E5EA; border-top-color: #007AFF; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- شاشة المصادقة -->
        <div id="authScreen">
            <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
                <div class="card" style="width: 100%;">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiH5Tji4WfG5r2d_T0XAd2LBBNB28t2dhFqJAcbR5JSpyMqqNB6IbugiC2Vos-2smWIa3tMpA7kEHf3iMcHSsbmkZUw9I1AwP-ocTRnlzLDJWjCb8eH5m2cRXiWpIa-O6a1bOSdyB9hUg-FepVa9QPjTs8Co6nX0_GDnednjERDFmN1quZbkIbW5wQjh2I/s1024/103777.png" class="avatar" alt="Logo">
                    <h2 style="font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 20px;">elgoharyX</h2>
                    
                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <div id="loginTab" class="active" onclick="switchTab('login')" style="flex: 1; text-align: center; padding: 12px; font-weight: 600; color: #007AFF; border-bottom: 2px solid #007AFF; cursor: pointer;">دخول</div>
                        <div id="signupTab" onclick="switchTab('signup')" style="flex: 1; text-align: center; padding: 12px; font-weight: 600; color: #8E8E93; border-bottom: 2px solid transparent; cursor: pointer;">حساب جديد</div>
                    </div>

                    <div id="loginForm">
                        <div class="input-group">
                            <div class="input-label">البريد الإلكتروني</div>
                            <input type="email" id="loginEmail" class="input-field dir-ltr" placeholder="example@email.com">
                        </div>
                        <div class="input-group">
                            <div class="input-label">كلمة المرور</div>
                            <input type="password" id="loginPassword" class="input-field dir-ltr" placeholder="••••••••">
                        </div>
                        <button class="btn" onclick="login()" id="loginBtn">تسجيل الدخول</button>
                    </div>

                    <div id="signupForm" class="hidden">
                        <div class="input-group">
                            <div class="input-label">الاسم</div>
                            <input type="text" id="signupName" class="input-field" placeholder="محمد أحمد">
                        </div>
                        <div class="input-group">
                            <div class="input-label">البريد الإلكتروني</div>
                            <input type="email" id="signupEmail" class="input-field dir-ltr" placeholder="example@email.com">
                        </div>
                        <div class="input-group">
                            <div class="input-label">كلمة المرور</div>
                            <input type="password" id="signupPassword" class="input-field dir-ltr" placeholder="••••••••">
                        </div>
                        <button class="btn" onclick="signup()" id="signupBtn">إنشاء حساب</button>
                    </div>
                    
                    <div id="authError" style="color: #FF3B30; font-size: 13px; text-align: center; margin-top: 12px;"></div>
                </div>
            </div>
        </div>

        <!-- الشاشة الرئيسية -->
        <div id="mainScreen" class="hidden">
            <div class="nav-bar">
                <div></div>
                <div style="font-size: 17px; font-weight: 600;">elgoharyX</div>
                <div onclick="toggleSidebar()" style="color: #007AFF; font-size: 17px; cursor: pointer;">القائمة</div>
            </div>

            <div style="padding: 16px;">
                <div class="card">
                    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiH5Tji4WfG5r2d_T0XAd2LBBNB28t2dhFqJAcbR5JSpyMqqNB6IbugiC2Vos-2smWIa3tMpA7kEHf3iMcHSsbmkZUw9I1AwP-ocTRnlzLDJWjCb8eH5m2cRXiWpIa-O6a1bOSdyB9hUg-FepVa9QPjTs8Co6nX0_GDnednjERDFmN1quZbkIbW5wQjh2I/s1024/103777.png" class="avatar">
                    <h2 style="font-size: 20px; font-weight: 700; text-align: center;" id="displayName"></h2>
                    <p style="font-size: 14px; color: #8E8E93; text-align: center;" id="displayEmail"></p>
                </div>

                <div class="card">
                    <div class="input-group">
                        <div class="input-label">الرابط الأصلي</div>
                        <input type="url" id="longUrl" class="input-field dir-ltr" placeholder="https://example.com">
                    </div>
                    <div class="input-group">
                        <div class="input-label">معرف مخصص (اختياري)</div>
                        <input type="text" id="customSlug" class="input-field dir-ltr" placeholder="my-link">
                    </div>
                    <button class="btn" onclick="createLink()" id="shortenBtn">إنشاء رابط مختصر</button>
                </div>

                <div id="resultArea" class="hidden">
                    <div class="card">
                        <div style="background: #F8F8FC; border-radius: 10px; padding: 14px; display: flex; align-items: center; justify-content: space-between;">
                            <a id="shortLink" href="#" target="_blank" class="dir-ltr" style="color: #007AFF; text-decoration: none; flex: 1; word-break: break-all;"></a>
                            <span onclick="copyLink()" style="color: #007AFF; font-weight: 600; cursor: pointer;">نسخ</span>
                        </div>
                        <div style="background: white; border-radius: 10px; padding: 20px; margin-top: 12px; text-align: center;">
                            <div id="qrcode" style="display: flex; justify-content: center;"></div>
                            <div onclick="downloadQR()" style="color: #007AFF; font-weight: 600; margin-top: 12px; cursor: pointer;">حفظ QR</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- شاشة التوجيه -->
        <div id="redirectScreen" class="hidden" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;">
            <div class="loader"></div>
            <div style="font-size: 20px; font-weight: 600; margin-top: 20px;">جاري التوجيه</div>
            <div id="redirectStatus" style="color: #8E8E93; margin-top: 8px;"></div>
        </div>
    </div>

    <!-- القائمة الجانبية -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div style="padding: 60px 20px 20px; border-bottom: 0.5px solid #E5E5EA; position: relative;">
            <div onclick="toggleSidebar()" style="position: absolute; top: 20px; left: 20px; width: 36px; height: 36px; background: #F2F2F7; border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer;">✕</div>
            <div style="font-size: 28px; font-weight: 700;">الروابط</div>
        </div>
        
        <div style="padding: 16px;">
            <div style="display: flex; align-items: center; gap: 12px; padding: 16px; background: #F8F8FC; border-radius: 12px; margin-bottom: 16px;">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiH5Tji4WfG5r2d_T0XAd2LBBNB28t2dhFqJAcbR5JSpyMqqNB6IbugiC2Vos-2smWIa3tMpA7kEHf3iMcHSsbmkZUw9I1AwP-ocTRnlzLDJWjCb8eH5m2cRXiWpIa-O6a1bOSdyB9hUg-FepVa9QPjTs8Co6nX0_GDnednjERDFmN1quZbkIbW5wQjh2I/s1024/103777.png" class="user-avatar-img" id="sidebarAvatar" alt="Logo">
                <div style="flex: 1;">
                    <div style="font-weight: 600;" id="sidebarName"></div>
                    <div style="font-size: 13px; color: #8E8E93;" id="sidebarEmail"></div>
                </div>
                <div onclick="logout()" style="color: #FF3B30; font-weight: 500; cursor: pointer;">خروج</div>
            </div>

            <div id="sidebarLoading"><div class="loader"></div></div>
            <div id="linksList"></div>
            <div id="emptyState" class="hidden" style="text-align: center; padding: 40px 20px; color: #8E8E93;">لا توجد روابط</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDGhCAU7DLleD1KkCR6SQmvl8bpDncHJ8g",
            authDomain: "planning-with-ai-797ec.firebaseapp.com",
            projectId: "planning-with-ai-797ec",
            databaseURL: "https://planning-with-ai-797ec-default-rtdb.firebaseio.com",
            storageBucket: "planning-with-ai-797ec.firebasestorage.app",
            messagingSenderId: "283439580292",
            appId: "1:283439580292:web:b566dc267bdb8861ca2ed1"
        };

        // رابط اللوجو
        const LOGO_URL = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiH5Tji4WfG5r2d_T0XAd2LBBNB28t2dhFqJAcbR5JSpyMqqNB6IbugiC2Vos-2smWIa3tMpA7kEHf3iMcHSsbmkZUw9I1AwP-ocTRnlzLDJWjCb8eH5m2cRXiWpIa-O6a1bOSdyB9hUg-FepVa9QPjTs8Co6nX0_GDnednjERDFmN1quZbkIbW5wQjh2I/s1024/103777.png";

        let app, db, currentUser = null;

        try {
            app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            console.log('✅ Firebase connected');
            window.dbReady = true;
        } catch (e) {
            console.error('Firebase error:', e);
            showToast('خطأ في الاتصال بقاعدة البيانات');
            window.dbReady = false;
        }

        // دوال عامة
        window.showToast = function(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        };

        window.switchTab = function(tab) {
            document.getElementById('loginTab').style.cssText = tab === 'login' ? 'color: #007AFF; border-bottom: 2px solid #007AFF;' : 'color: #8E8E93; border-bottom: 2px solid transparent;';
            document.getElementById('signupTab').style.cssText = tab === 'signup' ? 'color: #007AFF; border-bottom: 2px solid #007AFF;' : 'color: #8E8E93; border-bottom: 2px solid transparent;';
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
        };

        // إنشاء حساب
        window.signup = async function() {
            if (!db) { showToast('قاعدة البيانات غير متصلة'); return; }
            
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim().toLowerCase();
            const password = document.getElementById('signupPassword').value;

            if (!name || !email || !password) { showToast('جميع الحقول مطلوبة'); return; }
            if (password.length < 6) { showToast('كلمة المرور 6 أحرف على الأقل'); return; }

            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الإنشاء...';

            try {
                const emailKey = email.replace(/\./g, '_').replace(/\@/g, '_at_');
                
                const userSnap = await get(ref(db, 'users/' + emailKey));
                if (userSnap.exists()) {
                    showToast('البريد مستخدم بالفعل');
                    btn.disabled = false;
                    btn.textContent = 'إنشاء حساب';
                    return;
                }

                const userData = {
                    id: emailKey,
                    name: name,
                    email: email,
                    password: btoa(password),
                    createdAt: new Date().toISOString(),
                    avatar: LOGO_URL // حفظ اللوجو كأفاتار
                };

                await set(ref(db, 'users/' + emailKey), userData);
                
                currentUser = { id: emailKey, name, email, avatar: LOGO_URL };
                localStorage.setItem('elgoharyX_user', JSON.stringify(currentUser));
                showToast('تم إنشاء الحساب');
                showMainScreen();
            } catch (e) {
                console.error(e);
                showToast('خطأ: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'إنشاء حساب';
            }
        };

        // تسجيل دخول
        window.login = async function() {
            if (!db) { showToast('قاعدة البيانات غير متصلة'); return; }
            
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) { showToast('أدخل البريد وكلمة المرور'); return; }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الدخول...';

            try {
                const emailKey = email.replace(/\./g, '_').replace(/\@/g, '_at_');
                const userSnap = await get(ref(db, 'users/' + emailKey));
                
                if (!userSnap.exists()) {
                    showToast('البريد غير مسجل');
                    btn.disabled = false;
                    btn.textContent = 'تسجيل الدخول';
                    return;
                }

                const userData = userSnap.val();
                if (btoa(password) !== userData.password) {
                    showToast('كلمة المرور غير صحيحة');
                    btn.disabled = false;
                    btn.textContent = 'تسجيل الدخول';
                    return;
                }

                currentUser = { 
                    id: userData.id, 
                    name: userData.name, 
                    email: userData.email,
                    avatar: userData.avatar || LOGO_URL
                };
                localStorage.setItem('elgoharyX_user', JSON.stringify(currentUser));
                showToast('مرحباً ' + userData.name);
                showMainScreen();
            } catch (e) {
                console.error(e);
                showToast('خطأ: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'تسجيل الدخول';
            }
        };

        // تسجيل خروج
        window.logout = function() {
            currentUser = null;
            localStorage.removeItem('elgoharyX_user');
            toggleSidebar();
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('mainScreen').classList.add('hidden');
            showToast('تم تسجيل الخروج');
        };

        function showMainScreen() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            document.getElementById('displayName').textContent = currentUser.name;
            document.getElementById('displayEmail').textContent = currentUser.email;
            document.getElementById('sidebarName').textContent = currentUser.name;
            document.getElementById('sidebarEmail').textContent = currentUser.email;
            
            // تعيين اللوجو كأفاتار في القائمة الجانبية
            const avatarImg = document.getElementById('sidebarAvatar');
            if (avatarImg) {
                avatarImg.src = currentUser.avatar || LOGO_URL;
            }
            
            loadLinks();
        }

        function loadLinks() {
            if (!currentUser || !db) return;

            const linksRef = ref(db, 'user_links/' + currentUser.id);
            onValue(linksRef, (snapshot) => {
                document.getElementById('sidebarLoading').style.display = 'none';
                const listDiv = document.getElementById('linksList');
                listDiv.innerHTML = '';

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const slugs = Object.keys(data);
                    if (slugs.length === 0) {
                        document.getElementById('emptyState').classList.remove('hidden');
                        return;
                    }
                    document.getElementById('emptyState').classList.add('hidden');

                    slugs.forEach(slug => {
                        const item = data[slug];
                        const div = document.createElement('div');
                        div.className = 'link-item';
                        div.innerHTML = `
                            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                                <span style="width: 24px; height: 24px; background: rgba(0,122,255,0.1); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #007AFF;">🔗</span>
                                <span class="dir-ltr" style="font-weight: 600;">${slug}</span>
                            </div>
                            <div class="dir-ltr" style="font-size: 13px; color: #8E8E93; margin-bottom: 12px;">${item.target}</div>
                            <div class="link-actions">
                                <div class="link-btn btn-copy" onclick="copySidebarLink('${slug}')">نسخ</div>
                                <div class="link-btn btn-edit" onclick="editLink('${slug}', '${item.target}')">تعديل</div>
                                <div class="link-btn btn-delete" onclick="deleteLink('${slug}')">حذف</div>
                            </div>
                        `;
                        listDiv.appendChild(div);
                    });
                } else {
                    document.getElementById('emptyState').classList.remove('hidden');
                }
            }, (e) => {
                console.error(e);
                document.getElementById('sidebarLoading').style.display = 'none';
                document.getElementById('emptyState').classList.remove('hidden');
            });
        }

        window.copySidebarLink = function(slug) {
            const url = `${location.origin}${location.pathname}?${slug}`;
            navigator.clipboard?.writeText(url).then(() => showToast('تم النسخ'));
        };

        window.deleteLink = async function(slug) {
            if (!confirm('حذف؟')) return;
            try {
                await remove(ref(db, 'links/' + slug));
                await remove(ref(db, 'user_links/' + currentUser.id + '/' + slug));
                showToast('تم الحذف');
            } catch (e) { showToast('فشل'); }
        };

        window.editLink = async function(slug, old) {
            const newUrl = prompt('الرابط الجديد:', old);
            if (!newUrl || newUrl === old) return;
            try {
                await update(ref(db, 'links/' + slug), { target: newUrl });
                await update(ref(db, 'user_links/' + currentUser.id + '/' + slug), { target: newUrl });
                showToast('تم التحديث');
            } catch (e) { showToast('فشل'); }
        };

        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        };

        window.copyLink = function() {
            const link = document.getElementById('shortLink').innerText;
            if (link) navigator.clipboard?.writeText(link).then(() => showToast('تم النسخ'));
        };

        window.createLink = async function() {
            if (!currentUser) { showToast('سجل الدخول'); return; }
            if (!db) { showToast('قاعدة البيانات غير متصلة'); return; }

            const longUrl = document.getElementById('longUrl').value.trim();
            const customSlug = document.getElementById('customSlug').value.trim();
            if (!longUrl) { showToast('أدخل رابطاً'); return; }

            const btn = document.getElementById('shortenBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الإنشاء...';

            try {
                let slug = customSlug || Math.random().toString(36).substring(2, 8);
                if (customSlug) {
                    const snap = await get(ref(db, 'links/' + slug));
                    if (snap.exists()) { showToast('المعرف مستخدم'); btn.disabled = false; btn.textContent = 'إنشاء رابط مختصر'; return; }
                }

                const data = { target: longUrl, created_at: new Date().toISOString(), created_by: currentUser.id };
                await set(ref(db, 'links/' + slug), data);
                await set(ref(db, 'user_links/' + currentUser.id + '/' + slug), { target: longUrl, created_at: new Date().toISOString() });

                const shortUrl = `${location.origin}${location.pathname}?${slug}`;
                document.getElementById('shortLink').innerText = shortUrl;
                document.getElementById('shortLink').href = shortUrl;
                document.getElementById('resultArea').classList.remove('hidden');

                document.getElementById('qrcode').innerHTML = '';
                new QRCode(document.getElementById('qrcode'), { text: shortUrl, width: 150, height: 150 });

                document.getElementById('longUrl').value = '';
                document.getElementById('customSlug').value = '';
                showToast('تم الإنشاء');
            } catch (e) {
                console.error(e);
                showToast('خطأ: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'إنشاء رابط مختصر';
            }
        };

        window.downloadQR = function() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const a = document.createElement('a');
                a.download = 'qr.png';
                a.href = canvas.toDataURL();
                a.click();
            }
        };

        // التوجيه
        async function redirect() {
            const slug = location.search.substring(1).split('&')[0];
            if (!slug) return;

            document.getElementById('authScreen')?.classList.add('hidden');
            document.getElementById('mainScreen')?.classList.add('hidden');
            document.getElementById('redirectScreen')?.classList.remove('hidden');

            if (!db) {
                document.getElementById('redirectStatus').textContent = 'خطأ في الاتصال';
                setTimeout(() => location.href = location.origin + location.pathname, 2000);
                return;
            }

            try {
                const snap = await get(ref(db, 'links/' + slug));
                if (snap.exists()) {
                    document.getElementById('redirectStatus').textContent = 'جاري التوجيه...';
                    setTimeout(() => location.replace(snap.val().target), 500);
                } else {
                    document.getElementById('redirectStatus').textContent = 'الرابط غير موجود';
                    setTimeout(() => location.href = location.origin + location.pathname, 2000);
                }
            } catch (e) {
                document.getElementById('redirectStatus').textContent = 'خطأ';
                setTimeout(() => location.href = location.origin + location.pathname, 2000);
            }
        }

        // التهيئة
        window.addEventListener('DOMContentLoaded', () => {
            if (location.search.length > 1) { redirect(); return; }

            const saved = localStorage.getItem('elgoharyX_user');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    // التأكد من وجود avatar في البيانات المحفوظة
                    if (!currentUser.avatar) {
                        currentUser.avatar = LOGO_URL;
                    }
                    showMainScreen();
                } catch (e) { localStorage.removeItem('elgoharyX_user'); }
            }
        });
    </script>
</body>
</html>
